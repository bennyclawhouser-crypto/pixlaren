<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PIXLAREN – Gissa fotbollsstjärnan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C8102E;
      --red-dark: #9e0b22;
      --blue: #005B9E;
      --gold: #F5C518;
      --pitch-dark: #2d7a1f;
      --pitch-light: #35901f;
      --pitch-stripe: #308a1c;
      --line: rgba(255,255,255,0.75);
      --bg: #1a4a0e;
    }

    html, body {
      min-height: 100vh;
      background: var(--pitch-dark);
      font-family: 'Arial Black', 'Impact', sans-serif;
      color: white;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    /* Pitch stripe pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        var(--pitch-dark) 0px,
        var(--pitch-dark) 60px,
        var(--pitch-stripe) 60px,
        var(--pitch-stripe) 120px
      );
      z-index: -1;
    }


    /* Full pitch SVG overlay on all pages */
    .pitch-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 1;
    }
    /* ── START SCREEN ── */
    #start-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }



    .start-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .game-title {
      font-size: clamp(52px, 14vw, 96px);
      letter-spacing: 8px;
      color: white;
      text-shadow: 0 0 40px rgba(255,255,255,0.4), 0 4px 0 rgba(0,0,0,0.6), 0 0 80px rgba(200,230,100,0.3);
      line-height: 1;
    }

    .game-subtitle {
      font-size: clamp(13px, 3.5vw, 18px);
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
      font-family: Arial, sans-serif;
      font-weight: normal;
      text-transform: uppercase;
    }


    .start-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 22px 60px;
      font-family: 'Arial Black', sans-serif;
      font-size: clamp(22px, 6vw, 32px);
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(200,16,46,0.6), 0 2px 0 rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      margin-top: 10px;
    }
    .start-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(200,16,46,0.5); }
    .start-btn:hover:not(:disabled) { background: var(--red-dark); }
    .start-btn:disabled { opacity: 0.4; cursor: default; }

    .instructions {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      max-width: 300px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 32px;
      gap: 16px;
    }

    .game-header {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .game-header .title { font-size: 18px; letter-spacing: 4px; color: rgba(255,255,255,0.5); }
    .attempt-badge {
      background: var(--red);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* Optical illusion ring around image */
    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spinRingRev {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    .img-wrapper {
      position: relative;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer spinning conic ring */
    .illusion-ring-outer {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: conic-gradient(
        #C8102E 0deg, #ffffff 30deg, #C8102E 60deg, #000 90deg,
        #C8102E 120deg, #ffffff 150deg, #C8102E 180deg, #000 210deg,
        #C8102E 240deg, #ffffff 270deg, #C8102E 300deg, #000 330deg, #C8102E 360deg
      );
      animation: spinRing 4s linear infinite;
      mask: radial-gradient(circle, transparent 84%, black 85%);
      -webkit-mask: radial-gradient(circle, transparent 84%, black 85%);
    }

    /* Inner counter-spinning ring */
    .illusion-ring-inner {
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: conic-gradient(
        #005B9E 0deg, #C8E64C 45deg, #005B9E 90deg, #C8E64C 135deg,
        #005B9E 180deg, #C8E64C 225deg, #005B9E 270deg, #C8E64C 315deg, #005B9E 360deg
      );
      animation: spinRingRev 2.5s linear infinite;
      mask: radial-gradient(circle, transparent 88%, black 89%);
      -webkit-mask: radial-gradient(circle, transparent 88%, black 89%);
    }

    /* Pulsing glow */
    .illusion-glow {
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      background: transparent;
      box-shadow: 0 0 24px 8px rgba(200,16,46,0.5), 0 0 48px 16px rgba(0,91,158,0.3);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    /* Image container */
    .img-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a2e;
      z-index: 1;
    }

    /* Game layout row: image + highscore side by side */
    .game-row {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .game-row .img-wrapper {
      flex: 1;
      min-width: 0;
    }

    /* Highscore panel */
    .highscore-panel {
      width: 130px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .hs-title {
      font-family: 'Arial Black', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .hs-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .hs-entry:last-child { border-bottom: none; }
    .hs-rank {
      font-family: 'Arial Black', sans-serif;
      font-size: 10px;
      color: var(--muted, #666);
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .hs-rank.gold   { color: #FFD700; }
    .hs-rank.silver { color: #C0C0C0; }
    .hs-rank.bronze { color: #CD7F32; }
    .hs-name {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hs-score {
      font-family: 'Arial Black', sans-serif;
      font-size: 11px;
      color: var(--gold);
      flex-shrink: 0;
    }
    .hs-empty {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 8px 0;
      font-style: italic;
    }

    .player-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pixel-overlay {
      position: absolute;
      inset: 0;
      image-rendering: pixelated;
    }

    /* Hint banner */
    .hint-wrap {
      width: 100%;
      max-width: 380px;
      min-height: 44px;
    }
    .hint-text {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      text-align: center;
      line-height: 1.4;
    }

    /* Attempt button */
    .attempt-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px 0;
      width: 100%;
      max-width: 380px;
      font-family: 'Arial Black', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,16,46,0.5);
      transition: transform 0.1s;
    }
    .attempt-btn:active { transform: scale(0.97); }
    .attempt-btn:disabled { background: #444; box-shadow: none; cursor: default; }

    /* Guess input */
    .guess-section {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .guess-label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
    .guess-input {
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      color: white;
      font-size: 18px;
      font-family: Arial, sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .guess-input:focus { border-color: rgba(255,255,255,0.4); }
    .guess-input::placeholder { color: rgba(255,255,255,0.25); }

    .guess-btn {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Arial Black', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .guess-btn:active { transform: scale(0.97); }

    /* Result screen overlay */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    .result-overlay.show { display: flex; }
    .result-emoji { font-size: 72px; }
    .result-title { font-size: clamp(24px, 7vw, 40px); letter-spacing: 2px; }
    .result-title.win { color: var(--gold); }
    .result-title.lose { color: rgba(255,255,255,0.7); }
    .result-answer {
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
    }
    .result-score {
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: rgba(255,255,255,0.5);
    }
    .play-again-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px 40px;
      font-family: 'Arial Black', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Wrong guess flash */
    @keyframes wrongFlash {
      0%, 100% { border-color: rgba(255,255,255,0.15); }
      50% { border-color: var(--red); }
    }
    .wrong-flash { animation: wrongFlash 0.4s ease; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<!-- Football pitch lines -->
<svg class="pitch-lines" viewBox="0 0 100 60" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="3" width="94" height="54" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <line x1="50" y1="3" x2="50" y2="57" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <circle cx="50" cy="30" r="9" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <circle cx="50" cy="30" r="0.8" fill="rgba(255,255,255,0.6)"/>
  <rect x="3" y="18" width="14" height="24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <rect x="3" y="23" width="5" height="14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <circle cx="14" cy="30" r="0.8" fill="rgba(255,255,255,0.6)"/>
  <path d="M 17 24 A 9 9 0 0 1 17 36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <rect x="83" y="18" width="14" height="24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <rect x="92" y="23" width="5" height="14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <circle cx="86" cy="30" r="0.8" fill="rgba(255,255,255,0.6)"/>
  <path d="M 83 24 A 9 9 0 0 0 83 36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <path d="M 3 5.5 A 2.5 2.5 0 0 1 5.5 3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <path d="M 94.5 3 A 2.5 2.5 0 0 1 97 5.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <path d="M 3 54.5 A 2.5 2.5 0 0 0 5.5 57" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <path d="M 94.5 57 A 2.5 2.5 0 0 0 97 54.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
</svg>

<div id="start-screen">

  <div class="start-content">
    <div class="game-title">PIXLAREN</div>
    <div class="game-subtitle">Gissa fotbollsstjärnan</div>

    <!-- Difficulty slider -->
    <div style="width:100%;max-width:320px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-family:Arial,sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.6);text-transform:uppercase;">Svårighetsgrad</span>
        <span id="diff-label" style="font-family:'Arial Black',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;">5 — MEDEL</span>
      </div>
      <input type="range" id="difficulty-slider" min="1" max="10" value="5"
        oninput="updateDiffLabel(this.value)"
        style="width:100%;accent-color:var(--red);height:6px;cursor:pointer;" />
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-family:Arial,sans-serif;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;">LÄTT</span>
        <span style="font-family:Arial,sans-serif;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;">SVÅR</span>
      </div>
    </div>

    <!-- Name + Start row -->
    <div style="display:flex;align-items:center;gap:10px;width:100%;max-width:380px;">
      <input id="player-name-input" type="text" maxlength="14" placeholder="Ditt namn"
        style="flex:1;background:rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.3);border-radius:10px;padding:14px 14px;color:white;font-size:16px;font-family:Arial,sans-serif;outline:none;text-align:center;"
        oninput="const v=this.value.trim().length>0; ['start-btn','brawl-btn'].forEach(id=>{const b=document.getElementById(id);b.disabled=!v;b.style.opacity=v?'1':'0.4'});"
        onkeydown="if(event.key==='Enter' && this.value.trim()) startGame('football')" />
      <button id="start-btn" class="start-btn" onclick="startGame('football')" disabled style="white-space:nowrap;flex-shrink:0;opacity:0.4;">FOTBOLL</button>
      <button id="brawl-btn" onclick="startGame('brawl')" disabled style="white-space:nowrap;flex-shrink:0;opacity:0.4;background:#a855f7;color:white;border:none;border-radius:12px;padding:22px 20px;font-family:'Arial Black',sans-serif;font-size:clamp(16px,4vw,22px);letter-spacing:2px;cursor:pointer;box-shadow:0 8px 32px rgba(168,85,247,0.6);">BRAWL</button>
    </div>
    <p class="instructions">Bilden avslöjas steg för steg. Ju färre försök — desto fler poäng!</p>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="game-header">
    <div class="title">PIXLAREN</div>
    <div class="attempt-badge" id="attempt-badge">FÖRSÖK 0</div>
    <button onclick="goHome()" style="background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.7);font-family:'Arial Black',sans-serif;font-size:11px;letter-spacing:1px;padding:6px 12px;cursor:pointer;">HEM</button>
  </div>

  <div class="game-row">
    <div class="img-wrapper">
      <div class="illusion-ring-outer"></div>
      <div class="illusion-ring-inner"></div>
      <div class="illusion-glow"></div>
      <div class="img-container">
        <img id="player-img" class="player-img" src="" alt="Fotbollsspelare" />
        <canvas id="pixel-canvas" class="pixel-overlay"></canvas>
      </div>
    </div>

    <!-- Highscore panel -->
    <div class="highscore-panel">
      <!-- Name input -->
      <div style="margin-bottom:10px;">
        <div style="font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:4px;">Spelare</div>
        <input id="ingame-name" type="text" maxlength="12" placeholder="Ditt namn"
          value=""
          style="width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.25);border-radius:6px;padding:6px 8px;color:white;font-size:12px;font-family:Arial,sans-serif;outline:none;text-align:center;"
          oninput="playerName = this.value.trim() || 'Anonym'" />
      </div>
      <div class="hs-title" style="margin-bottom:6px;">🏆 TOPP 10</div>
      <div id="hs-list"><div class="hs-empty">Inga poäng än</div></div>
    </div>
  </div>



  <button class="attempt-btn" id="attempt-btn">
    FÖRSÖK (1)
  </button>

  <div class="guess-section">
    <div class="guess-label">Din gissning</div>
    <input class="guess-input" id="guess-input" type="text" placeholder="Skriv spelarens namn..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <div style="display:flex;gap:8px;">
      <button class="guess-btn" onclick="checkGuess()" style="flex:1;">GISSA</button>
      <button id="hint-btn" onclick="showHint()" style="background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);border-radius:10px;padding:14px 14px;font-family:'Arial Black',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;white-space:nowrap;">LEDTRÅD</button>
    </div>
    <div id="hint-display" style="display:none;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 14px;font-family:Arial,sans-serif;font-size:13px;color:rgba(255,255,255,0.85);text-align:center;line-height:1.4;"></div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-emoji" id="result-emoji"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-answer" id="result-answer"></div>
  <div class="result-score" id="result-score"></div>
  <button class="play-again-btn" onclick="resetGame()">SPELA IGEN</button>
</div>

// Lätt = fler steg, snabbt avslöjad. Svår = färre steg, stannar mer pixlad.
function getPixelSizes(difficulty) {
  // Always exactly 5 attempts + 1 final reveal = 6 entries
  // difficulty controls how blurry the start is and how slowly it clears
  const maxBlur = [16, 20, 24, 30, 36, 44, 52, 60, 70, 80][difficulty - 1];
  const sizes = [];
  const steps = 5;
  for (let i = 0; i < steps; i++) {
    const v = Math.round(maxBlur * Math.pow(1.5 / maxBlur, i / (steps - 1)));
    sizes.push(Math.max(v, 2));
  }
  sizes.push(1); // fully revealed after all attempts
  return sizes;
}

async function upsertRemoteScore(name, addScore) {
  try {
    // Check if exists
    const res = await fetch(`${SB_URL}/rest/v1/pixlaren_scores?name=eq.${encodeURIComponent(name)}&select=id,score,games`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    const existing = await res.json();
    if (existing.length > 0) {
      const row = existing[0];
      await fetch(`${SB_URL}/rest/v1/pixlaren_scores?id=eq.${row.id}`, {
        method: 'PATCH',
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ score: row.score + addScore, games: row.games + 1, updated_at: new Date().toISOString() })
      });
    } else {
      await fetch(`${SB_URL}/rest/v1/pixlaren_scores`, {
        method: 'POST',
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ name, score: addScore, games: 1 })
      });
    }
    await renderHighscores();
  } catch(e) { console.error('upsert error', e); }
}

function applyPixelation(pixelSize) {
  const img = document.getElementById('player-img');
  const canvas = document.getElementById('pixel-canvas');
  const ctx = canvas.getContext('2d');
  const W = img.offsetWidth || 380;
  const H = img.offsetHeight || 380;
  canvas.width = W;
  canvas.height = H;

  if (pixelSize <= 1) {
    // Fully revealed — clear overlay
    ctx.clearRect(0, 0, W, H);
    return;
  }

  // Draw tiny, then scale up for pixelation effect
  const offscreen = document.createElement('canvas');
  const sw = Math.ceil(W / pixelSize);
  const sh = Math.ceil(H / pixelSize);
  offscreen.width = sw;
  offscreen.height = sh;
  const oc = offscreen.getContext('2d');
  oc.imageSmoothingEnabled = false;
  oc.drawImage(img, 0, 0, sw, sh);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offscreen, 0, 0, sw, sh, 0, 0, W, H);
}

// Levenshtein distance — counts edit distance between two strings
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function isCloseEnough(guess, target) {
  // Allow 1 typo for names up to 6 chars, 2 typos for longer
  const maxDist = target.length <= 6 ? 1 : 2;
  return levenshtein(guess, target) <= maxDist;
}

function checkGuess() {
  const input = document.getElementById('guess-input');
  const guess = input.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (!guess) return;

  const correct = currentPlayer.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const alternatives = (currentPlayer.alternativeNames || []).map(a => a.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''));

  // Check exact, alternative names, partial match, or fuzzy (1-2 typos)
  const correctParts = correct.split(' ');
  const isCorrect = guess === correct
    || alternatives.some(a => guess === a || isCloseEnough(guess, a))
    || correctParts.some(part => part.length > 3 && (guess === part || isCloseEnough(guess, part)))
    || isCloseEnough(guess, correct);

  if (isCorrect) {
    gameOver = true;
    // Base score: 10 - 2 per attempt. Multiplied by difficulty (1=×0.5, 5=×1, 10=×2)
    const diffMultiplier = Math.round((0.5 + (currentDifficulty - 1) * (1.5 / 9)) * 10) / 10;
    const baseScore = Math.max(10 - currentAttempt * 2, 1);
    const score = Math.max(Math.round(baseScore * diffMultiplier) - hintPenalty, 1);
    applyPixelation(1);
    sessionScore += score;
    saveHighscore(playerName, score, currentAttempt + 1);
    showResult(true, score);
  } else {
    input.classList.add('wrong-flash');
    setTimeout(() => input.classList.remove('wrong-flash'), 400);
    input.value = '';
    input.placeholder = 'Fel! Försök igen...';
    setTimeout(() => input.placeholder = 'Skriv spelarens namn...', 1500);
  }
}
